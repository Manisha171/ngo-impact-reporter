version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ngo_reporter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://postgres:root123@db:5432/ngo_reporter
      JWT_SECRET: supersecretkey123
      ADMIN_USER: admin
      ADMIN_PASS: admin123
      PORT: 4000
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
